<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HemoScan - Lab Management (Meet 10)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen">

    <!-- Header -->
    <header class="bg-red-700 text-white shadow-md">
        <div class="max-w-5xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold uppercase tracking-wide">HemoScan System</h1>
            <nav class="space-x-4 text-sm font-medium">
                <span class="opacity-75">Meet 10: Tailwind & DOM</span>
            </nav>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-6 py-10 space-y-10">

        <!-- Section 1: Dashboard Stats (DOM Demo) -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-red-600">
                <h3 class="text-gray-500 text-sm font-semibold uppercase">Stok Darah Tersedia</h3>
                <p id="stat-inventory" class="text-4xl font-bold text-gray-900">0</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-blue-600">
                <h3 class="text-gray-500 text-sm font-semibold uppercase">Permintaan Aktif</h3>
                <p id="stat-requests" class="text-4xl font-bold text-gray-900">0</p>
            </div>
        </div>

        <!-- Section 2: Blood Scanner (DOM Manipulation) -->
        <section class="bg-white p-8 rounded-lg shadow-sm">
            <h2 class="text-xl font-bold mb-6 border-bottom pb-2">Simulator Scanner Golongan Darah</h2>
            
            <div class="flex flex-col md:flex-row gap-6 items-start">
                <div class="w-full md:w-1/2 space-y-4">
                    <label class="block text-sm font-medium text-gray-700">Pilih ID Sampel untuk Dianalisis:</label>
                    <div class="flex gap-2">
                        <select id="sampleSelect" class="flex-1 border border-gray-300 rounded-md px-4 py-2 focus:ring-2 focus:ring-red-500 focus:outline-none">
                            <option value="">-- Pilih Sampel --</option>
                            <option value="SMP-001">SMP-001</option>
                            <option value="SMP-002">SMP-002</option>
                            <option value="SMP-003">SMP-003</option>
                        </select>
                        <button id="startScan" class="bg-red-600 hover:bg-red-700 text-white px-6 py-2 rounded-md font-bold transition disabled:bg-gray-400">
                            Mulai Analisis
                        </button>
                    </div>
                    <p id="scanStatusText" class="text-sm text-gray-500 italic">Menunggu input...</p>
                </div>

                <div id="resultContainer" class="hidden w-full md:w-1/2 p-6 bg-red-50 border border-red-200 rounded-md">
                    <p class="text-xs font-bold text-red-600 uppercase mb-1">Hasil Analisis AI:</p>
                    <div class="flex justify-between items-baseline">
                        <h4 id="bloodTypeResult" class="text-3xl font-black text-gray-900">O+</h4>
                        <span class="text-gray-600 text-sm">Akurasi: <span id="confidenceScore" class="font-bold text-green-600">98%</span></span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Section 3: Data Management (DOM Table) -->
        <section class="bg-white rounded-lg shadow-sm overflow-hidden">
            <div class="p-6 border-b flex justify-between items-center">
                <h2 class="text-xl font-bold">Daftar Permintaan Darah</h2>
                <button id="addRequest" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md text-sm font-bold">
                    + Tambah Manual
                </button>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b">
                        <tr>
                            <th class="px-6 py-3 text-xs font-bold text-gray-500 uppercase">ID Request</th>
                            <th class="px-6 py-3 text-xs font-bold text-gray-500 uppercase">Rumah Sakit</th>
                            <th class="px-6 py-3 text-xs font-bold text-gray-500 uppercase">Gol. Darah</th>
                            <th class="px-6 py-3 text-xs font-bold text-gray-500 uppercase">Status</th>
                            <th class="px-6 py-3 text-xs font-bold text-gray-500 uppercase">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="requestTableBody" class="divide-y divide-gray-200">
                        <!-- Baris akan diisi oleh JavaScript -->
                    </tbody>
                </table>
            </div>
        </section>

    </main>

    <footer class="text-center py-10 text-gray-400 text-sm">
        <p>&copy; 2026 HemoScan Laboratory - Meet 10 PDWA</p>
    </footer>

    <script>
        // --- DATA & STATE ---
        const bloodTypes = ['A+', 'B+', 'AB+', 'O+', 'A-', 'B-', 'AB-', 'O-'];
        const hospitals = ['RS Bethesda', 'RS Sardjito', 'RS Panti Rapih', 'PMI Yogyakarta'];
        let inventoryValue = 1500;
        
        let requestData = [
            { id: 'REQ-101', hospital: 'RS Bethesda', type: 'A+', status: 'Pending' },
            { id: 'REQ-102', hospital: 'RS Sardjito', type: 'O-', status: 'Dikirim' }
        ];

        // --- DOM ELEMENTS ---
        const inventoryEl = document.getElementById('stat-inventory');
        const requestsCountEl = document.getElementById('stat-requests');
        const tableBody = document.getElementById('requestTableBody');
        const scanBtn = document.getElementById('startScan');
        const scanStatus = document.getElementById('scanStatusText');
        const resultContainer = document.getElementById('resultContainer');
        const bloodTypeResult = document.getElementById('bloodTypeResult');
        const confidenceScore = document.getElementById('confidenceScore');
        const sampleSelect = document.getElementById('sampleSelect');
        const addRequestBtn = document.getElementById('addRequest');

        // --- FUNCTIONS ---

        // 1. Render Tabel Permintaan
        function renderTable() {
            tableBody.innerHTML = '';
            requestData.forEach((item, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="px-6 py-4 text-sm font-mono">${item.id}</td>
                    <td class="px-6 py-4 text-sm">${item.hospital}</td>
                    <td class="px-6 py-4 text-sm font-bold text-red-600">${item.type}</td>
                    <td class="px-6 py-4 text-sm">
                        <span class="px-2 py-1 rounded-full text-xs font-bold ${item.status === 'Pending' ? 'bg-yellow-100 text-yellow-700' : 'bg-green-100 text-green-700'}">
                            ${item.status}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-sm">
                        <button onclick="deleteRequest(${index})" class="text-red-500 hover:underline">Hapus</button>
                    </td>
                `;
                tableBody.appendChild(row);
            });
            requestsCountEl.innerText = requestData.length;
        }

        // 2. Animasi Angka Inventory
        function animateInventory() {
            let current = 0;
            const step = Math.ceil(inventoryValue / 50);
            const interval = setInterval(() => {
                current += step;
                if (current >= inventoryValue) {
                    current = inventoryValue;
                    clearInterval(interval);
                }
                inventoryEl.innerText = current.toLocaleString();
            }, 30);
        }

        // 3. Hapus Request (DOM Manipulation)
        window.deleteRequest = (index) => {
            requestData.splice(index, 1);
            renderTable();
        };

        // --- EVENT LISTENERS ---

        // Simulator Scan
        scanBtn.addEventListener('click', () => {
            if (!sampleSelect.value) {
                alert('Pilih sampel terlebih dahulu!');
                return;
            }

            scanBtn.disabled = true;
            scanStatus.innerText = 'Menganalisis spektrum darah...';
            resultContainer.classList.add('hidden');

            setTimeout(() => {
                const randomType = bloodTypes[Math.floor(Math.random() * bloodTypes.length)];
                const randomAcc = (Math.random() * (99.9 - 95.0) + 95.0).toFixed(1);

                bloodTypeResult.innerText = randomType;
                confidenceScore.innerText = randomAcc + '%';
                
                scanStatus.innerText = 'Analisis selesai.';
                resultContainer.classList.remove('hidden');
                scanBtn.disabled = false;
            }, 2000);
        });

        // Tambah Request Baru
        addRequestBtn.addEventListener('click', () => {
            const newReq = {
                id: 'REQ-' + Math.floor(Math.random() * 900 + 100),
                hospital: hospitals[Math.floor(Math.random() * hospitals.length)],
                type: bloodTypes[Math.floor(Math.random() * bloodTypes.length)],
                status: 'Pending'
            };
            requestData.unshift(newReq);
            renderTable();
        });

        // --- INITIALIZE ---
        renderTable();
        animateInventory();

    </script>
</body>
</html>
